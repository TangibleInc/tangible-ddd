# TangibleDDD Tactician Configuration (fully wired)
#
# This file provides a ready-to-use CommandBus and QueryBus, plus the
# default naming-convention mapping used by Tangible plugins.
#
# Notes:
# - Requires `league/tactician` (suggested dependency).
# - Consumers can override services or wrap with additional middleware
#   (locking, custom transactions, metrics, etc.).

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: true

  # ============================================
  # Command Bus (write pipeline)
  # ============================================
  #
  # Middleware order:
  # 1. CorrelationMiddleware - THE ACT BRACKET: guard + scope + audit record
  # 2. TransactionMiddleware - starts database transaction (for ITransactionalCommand)
  # 3. DomainEventsPublishMiddleware - publishes events (writes to outbox inside transaction)
  # 4. SelfExecutingCommandMiddleware - runs a SelfHandlingCommand's own handle()
  #    (terminal for those; short-circuits before the naming-convention resolver)
  # 5. CommandHandlerMiddleware - executes the handler (plain commands)
  #
  League\Tactician\CommandBus:
    public: true
    arguments:
      - '@TangibleDDD\Application\Correlation\CorrelationMiddleware'
      - '@TangibleDDD\Application\Persistence\TransactionMiddleware'
      - '@TangibleDDD\Application\Events\DomainEventsPublishMiddleware'
      - '@TangibleDDD\Application\CQRS\SelfExecutingCommandMiddleware'
      - '@tactician.middleware.command_handler'

  # ============================================
  # Query Bus (read-only pipeline)
  # ============================================
  # NO act bracket here: queries are reads, not moments — they get no audit
  # row, must not trip the no-nesting guard when dispatched inside a command,
  # and must never re-finalise the previous act's un-reset event log. A query
  # rides the ambient scope of whoever dispatched it (consumer yamls and the
  # scaffolder already have this shape; this was drift).
  #
  # The self-executing middleware (shared with the command bus) runs a
  # SelfHandlingQuery's own handle() and returns the read result — terminal
  # for those; a plain query passes through to the resolver. Nothing else
  # belongs in this chain.
  tactician.query_bus:
    class: League\Tactician\CommandBus
    public: true
    arguments:
      - '@TangibleDDD\Application\CQRS\SelfExecutingCommandMiddleware'
      - '@tactician.middleware.query_handler'

  # ============================================
  # Self-executing middleware (commands AND queries)
  # ============================================
  # Runs a SelfHandlingCommand's or SelfHandlingQuery's own protected
  # handle() by reflection, method-injecting its dependencies from the
  # container (one middleware serves both bus chains). Explicit
  # @service_container argument — it is not reliably autowired by type.
  TangibleDDD\Application\CQRS\SelfExecutingCommandMiddleware:
    arguments: ['@service_container']

  # ============================================
  # Handler Middleware
  # ============================================
  tactician.middleware.command_handler:
    class: League\Tactician\Handler\CommandHandlerMiddleware
    arguments:
      - '@service_container'
      - '@tactician.command_to_handler_mapping'

  tactician.middleware.query_handler:
    class: League\Tactician\Handler\CommandHandlerMiddleware
    arguments:
      - '@service_container'
      - '@tactician.query_to_handler_mapping'

  # ============================================
  # Naming Convention Mapping
  # ============================================
  tactician.command_to_handler_mapping:
    class: League\Tactician\Handler\Mapping\MapByNamingConvention\MapByNamingConvention
    arguments:
      - '@tactician.class_name_inflector'
      - '@tactician.method_name_inflector'

  tactician.query_to_handler_mapping:
    class: League\Tactician\Handler\Mapping\MapByNamingConvention\MapByNamingConvention
    arguments:
      - '@tactician.class_name_inflector'
      - '@tactician.method_name_inflector'

  tactician.class_name_inflector:
    class: TangibleDDD\WordPress\DI\HandlerClassNameInflector

  tactician.method_name_inflector:
    class: League\Tactician\Handler\Mapping\MapByNamingConvention\MethodName\Handle
